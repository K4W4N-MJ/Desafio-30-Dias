<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌡️ Conversor</h1>

        <input type="number" id="temp" placeholder="Digite a temperatura">

        <select id="tipo">
            <option value="c-f">Celsius → Fahrenheit</option>
            <option value="f-c">Fahrenheit → Celsius</option>
        </select>

        <button id="btn">Converter</button>

        <p id="resultado">Resultado aparecerá aqui</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
