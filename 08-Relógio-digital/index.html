<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relogio Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="app">


    <section class="clock" aria-labelledby="clock-title">

      <h1 id="clock-title" class="visually-hidden">
        Relógio digital em tempo real
      </h1>
      <time id="time" class="clock__time" datetime="">
        00:00:00
      </time>


      <p id="date" class="clock__date">
        Carregando data...
      </p>

    </section>

  </main>

  <script src="./script.js"></script>
</body>

</html>
